<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yan Linyi · No Game, No Life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:  #3a2010;
      --ink2: rgba(58,32,16,.48);
      --acc:  #c07040;
    }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', 'Source Han Sans SC', -apple-system, sans-serif;
      /*
       * Three-layer background built from the image's own edge colours:
       *   layer 1 — dusty-rose halo on the left  (matches image left edge ~#c09098)
       *   layer 2 — warm-gold halo on the right  (matches image right edge ~#d4b070)
       *   layer 3 — base warm-peach radial        (matches image centre)
       * Together they eliminate the visible seam when the canvas mask fades out.
       */
      background:
        radial-gradient(ellipse 72% 85% at  6% 50%, rgba(178,118,128,.40) 0%, transparent 56%),
        radial-gradient(ellipse 55% 70% at 96% 54%, rgba(200,148, 80,.28) 0%, transparent 52%),
        radial-gradient(ellipse 140% 130% at 50% 36%, #fde4cc 0%, #f0c4a0 44%, #e5a87c 100%);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ── nav ─────────────────────────────────── */
    header {
      position: fixed; inset: 0 0 auto;
      background: rgba(253,228,204,.80);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(192,112,64,.10);
      z-index: 100;
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 0 1.5rem; }
    nav {
      display: flex; align-items: center;
      justify-content: space-between; height: 3.6rem;
    }
    .logo { font-weight: 700; font-size: 1rem; color: var(--ink); text-decoration: none; }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--ink2);
      font-size: .75rem; font-weight: 500;
      letter-spacing: .07em; text-transform: uppercase;
      transition: color .15s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--acc); }
    .menu-btn {
      display: none; background: none; border: none;
      font-size: 1.35rem; color: var(--ink); cursor: pointer; padding: .3rem;
    }
    @media (max-width: 640px) {
      .menu-btn { display: block; }
      .nav-links {
        position: fixed; top: 3.6rem; inset: auto 0;
        background: rgba(253,228,204,.97);
        backdrop-filter: blur(16px);
        flex-direction: column; align-items: center;
        padding: 1.2rem 0; gap: .9rem;
        transform: translateY(-110%);
        transition: transform .26s ease;
        z-index: 99;
      }
      .nav-links.open { transform: translateY(0); }
    }

    /* ── hero ────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 5rem 1rem 3.5rem; gap: 1.6rem;
    }

    /*
     * Wide card — 16:9, no border-radius, no clip.
     * 3-D tilt applied here.
     */
    .card {
      position: relative;
      width: min(820px, 92vw);
      aspect-ratio: 1376 / 768;
      transform-style: preserve-3d;
      transition: transform .07s linear;
      cursor: crosshair;
      will-change: transform;
    }

    /*
     * Canvas fills the card.
     * mask-image creates a four-edge vignette:
     *   — fully opaque centre
     *   — fades to transparent toward each edge
     * Transparent pixels reveal the body background, which is
     * colour-matched to the image edges → no visible seam.
     *
     * Fade zones: 20 % left/right, 14 % top/bottom.
     * Wider zones = more gradual dissolve = any residual colour
     * difference blends away over a longer distance.
     */
    #cvs {
      display: block;
      width: 100%; height: 100%;
      -webkit-mask-image:
        linear-gradient(to right,  transparent 0%, black 20%, black 80%, transparent 100%),
        linear-gradient(to bottom, transparent 0%, black 14%, black 86%, transparent 100%);
      -webkit-mask-composite: destination-in;
      mask-image:
        linear-gradient(to right,  transparent 0%, black 20%, black 80%, transparent 100%),
        linear-gradient(to bottom, transparent 0%, black 14%, black 86%, transparent 100%);
      mask-composite: intersect;
    }

    /* ── text & buttons ──────────────────────── */
    .hero-text { text-align: center; }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700; letter-spacing: -.025em; line-height: 1.15;
    }
    .sub {
      margin-top: .35rem; font-size: .78rem; color: var(--ink2);
      letter-spacing: .09em; text-transform: uppercase;
    }
    .hint {
      margin-top: .2rem; font-size: .68rem; color: var(--ink2);
      transition: opacity .8s;
    }
    .hint.gone { opacity: 0; }

    .btns { display: flex; gap: .7rem; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: .38rem;
      padding: .55rem 1.3rem; border-radius: .45rem;
      font-size: .82rem; font-weight: 500; font-family: inherit;
      text-decoration: none; border: none; cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .btn-solid { background: var(--acc); color: #fff; }
    .btn-solid:hover {
      background: #a85c2e; transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(192,112,64,.3);
    }
    .btn-out {
      background: transparent; color: var(--acc);
      border: 1.5px solid rgba(192,112,64,.38);
    }
    .btn-out:hover { border-color: var(--acc); transform: translateY(-1px); }

    /* ── footer ──────────────────────────────── */
    footer {
      border-top: 1px solid rgba(192,112,64,.12);
      padding: 2.2rem 0; background: rgba(234,170,128,.08);
    }
    .foot-row {
      display: flex; flex-wrap: wrap; gap: 1rem;
      align-items: center; justify-content: space-between;
    }
    .foot-links { display: flex; gap: 1.2rem; flex-wrap: wrap; }
    .foot-links a {
      color: var(--ink2); text-decoration: none;
      font-size: .78rem; transition: color .15s;
    }
    .foot-links a:hover { color: var(--acc); }
    .copy { margin-top: 1.4rem; text-align: center; font-size: .7rem; color: var(--ink2); }
  </style>
</head>
<body>

  <header>
    <div class="wrap">
      <nav>
        <a href="index.html" class="logo">Yan Linyi</a>
        <button class="menu-btn" aria-label="菜单">☰</button>
        <ul class="nav-links" id="nav-links">

  <main>

      <div class="hero-text">

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.4"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

  <footer>
    <div class="wrap">
      <div class="foot-row">
        <div>
          <strong>Yan Linyi的个人主页</strong>
          <p style="font-size:.76rem;color:var(--ink2);margin-top:.15rem">No Game, No Life</p>

  <script src="js/time-utility.js"></script>
  <script src="js/theme-switcher.js"></script>

  <script>
  /* ── mobile nav ─────────────────────────── */
  (function () {
    var btn = document.querySelector('.menu-btn');
    var nav = document.getElementById('nav-links');
    if (!btn) return;
    btn.addEventListener('click', function () { nav.classList.toggle('open'); });
    document.addEventListener('click', function (e) {
      if (!e.target.closest('header')) nav.classList.remove('open');
    });
  })();

  /* ════════════════════════════════════════════════════════
     PARTICLE ENGINE  — video-inspired organic dust
     ════════════════════════════════════════════════════════
     Rendering strategy
     ───────────────────
     • offscreen canvas holds the full-resolution image — drawn once
     • each frame: copy offscreen → visible canvas (sharp, no pixelation)
     • active tiles: erase home pixel via destination-out composite,
       then draw a small glowing dot at the drifting position
     • this way the base image is always crisp; only "departed" pixels
       become small floating particles

     Motion (video-style)
     ─────────────────────
     • slow initial speed (dusty, not explosive)
     • sinusoidal lateral wander — organic float
     • slight upward bias — lighter-than-air feel
     • damped spring return on mouse-leave
  ════════════════════════════════════════════════════════ */
  (function () {
    var STEP   = 4;    // sample grid spacing (px) — fewer tiles, same image sharpness
    var DOT    = 2;    // particle dot radius (px)
    var RADIUS = 88;   // cursor influence radius (canvas px)
    var MAX_D  = 115;  // distance → fully faded
    var SPEED  = 1.0;  // max launch speed (canvas px/frame)
    var SPRING = 0.11;
    var DAMP   = 0.72;
    var GLOW   = 6;    // shadowBlur for each dot

    var cvs    = document.getElementById('cvs');
    var ctx    = cvs.getContext('2d');
    var card   = document.getElementById('card');
    var hint   = document.getElementById('hint');

    var offscr = document.createElement('canvas');
    var octx   = offscr.getContext('2d');

    var tiles  = [];
    var imgW = 0, imgH = 0;
    var mx = -9999, my = -9999;
    var over   = false;
    var hinted = false;

    /* ── load & sample ──────────────────────── */
    var img = new Image();
    img.onload = function () {
      imgW = img.naturalWidth;
      imgH = img.naturalHeight;
      cvs.width    = imgW;
      cvs.height   = imgH;
      offscr.width  = imgW;
      offscr.height = imgH;

      octx.drawImage(img, 0, 0);
      var pd = octx.getImageData(0, 0, imgW, imgH).data;

      for (var ty = 0; ty < imgH; ty += STEP) {
        for (var tx = 0; tx < imgW; tx += STEP) {
          var sx = Math.min(tx + (STEP >> 1), imgW - 1);
          var sy = Math.min(ty + (STEP >> 1), imgH - 1);
          var i  = (sy * imgW + sx) * 4;
          if (pd[i + 3] < 10) continue;
          tiles.push({
            hx: tx, hy: ty, x: tx, y: ty,
            vx: 0, vy: 0,
            col: 'rgb(' + pd[i] + ',' + pd[i+1] + ',' + pd[i+2] + ')',
            phase: Math.random() * Math.PI * 2,
            freq:  0.020 + Math.random() * 0.022,
            amp:   0.28  + Math.random() * 0.52,
            t: 0, alpha: 1, active: false
          });
        }
      }
      requestAnimationFrame(loop);
    };
    img.src = 'public/images/avatar.jpg';

    /* ── render loop ────────────────────────── */
    function loop() {
      /* 1. Sharp full image */
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.shadowBlur  = 0;
      ctx.drawImage(offscr, 0, 0);

      /* 2. Erase home pixels of active tiles (punch holes) */
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#000';
      for (var i = 0; i < tiles.length; i++) {
        var t = tiles[i];
        var d2h = Math.hypot(t.x - t.hx, t.y - t.hy);
        if (!t.active && d2h < 0.6) continue;
        var ea = t.active ? t.alpha : Math.min(1, d2h / 10);
        if (ea < 0.02) continue;
        ctx.globalAlpha = ea;
        ctx.fillRect(t.hx, t.hy, STEP, STEP);
      }

      /* 3. Draw glowing particle dots */
      ctx.globalCompositeOperation = 'source-over';
      for (var i = 0; i < tiles.length; i++) {
        var t = tiles[i];

        /* physics */
        var dx   = t.hx + STEP * 0.5 - mx;
        var dy   = t.hy + STEP * 0.5 - my;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (over && dist < RADIUS) {
          if (!t.active) {
            var inf   = 1 - dist / RADIUS;
            var angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1.1;
            var spd   = inf * SPEED * (0.45 + Math.random() * 0.55);
            t.vx = Math.cos(angle) * spd;
            t.vy = Math.sin(angle) * spd - 0.18;
            t.active = true; t.t = 0;
          }
          t.t++;
          var vl = Math.sqrt(t.vx * t.vx + t.vy * t.vy) || 1;
          var wander = t.amp * Math.sin(t.phase + t.t * t.freq);
          t.x += t.vx + (-t.vy / vl) * wander;
          t.y += t.vy + ( t.vx / vl) * wander;
          t.vx *= 0.987; t.vy *= 0.987;
          t.alpha = Math.max(0, 1 - Math.hypot(t.x - t.hx, t.y - t.hy) / MAX_D);
        } else {
          t.active = false;
          t.vx = (t.vx + (t.hx - t.x) * SPRING) * DAMP;
          t.vy = (t.vy + (t.hy - t.y) * SPRING) * DAMP;
          t.x += t.vx; t.y += t.vy;
          var d2h = Math.hypot(t.x - t.hx, t.y - t.hy);
          t.alpha = Math.min(1, d2h / 8);
          if (d2h < 0.4) { t.x = t.hx; t.y = t.hy; t.vx = 0; t.vy = 0; continue; }
        }

        if (t.alpha < 0.04) continue;
        ctx.shadowBlur  = GLOW;
        ctx.shadowColor = t.col;
        ctx.globalAlpha = t.alpha;
        ctx.fillStyle   = t.col;
        ctx.beginPath();
        ctx.arc(t.x + STEP * 0.5, t.y + STEP * 0.5, DOT, 0, 6.2832);
        ctx.fill();
      }

      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(loop);
    }

    /* ── coordinate conversion ──────────────── */
    function toCvs(cx, cy) {
      var r = cvs.getBoundingClientRect();
      return { x: (cx - r.left) * (imgW / r.width), y: (cy - r.top) * (imgH / r.height) };
    }

    /* ── 3-D tilt (±14°) — no translation ──── */
    card.addEventListener('mousemove', function (e) {
      over = true;
      if (!hinted) { hinted = true; hint.classList.add('gone'); }

      var r  = card.getBoundingClientRect();
      var nx = (e.clientX - r.left  - r.width  / 2) / (r.width  / 2);
      var ny = (e.clientY - r.top   - r.height / 2) / (r.height / 2);
      card.style.transform =
        'perspective(900px) rotateX(' + (-ny * 14) + 'deg) rotateY(' + (nx * 14) + 'deg) scale3d(1.02,1.02,1.02)';

      var p = toCvs(e.clientX, e.clientY);
      mx = p.x; my = p.y;
    });

    card.addEventListener('mouseleave', function () {
      over = false; mx = -9999; my = -9999;
      card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';
    });
  })();
  </script>

</body>
