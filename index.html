<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yan Linyi的个人主页 - No Game, No Life</title>
    <link rel="stylesheet" href="css/theme-toggle.css">
    <style>
        /* ── Reset & Base ───────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2F80ED;
            --hero-bg: #090a0f;
            --status-green: #48c774;
            --text-primary: rgba(255, 255, 255, 0.92);
            --text-dim: rgba(255, 255, 255, 0.45);
            --input-bg: rgba(255, 255, 255, 0.07);
            --input-border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Inter', 'Source Han Sans', -apple-system, sans-serif;
            background-color: var(--hero-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── Header / Nav ───────────────────────────────────── */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(9, 10, 15, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 100;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 4rem;
        }

        .logo {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }

            .nav-links {
                position: fixed;
                top: 4rem;
                left: 0; right: 0;
                background-color: rgba(9, 10, 15, 0.95);
                backdrop-filter: blur(20px);
                flex-direction: column;
                align-items: center;
                padding: 1.5rem 0;
                gap: 1.25rem;
                transform: translateY(-110%);
                transition: transform 0.3s ease;
                z-index: 99;
            }

            .nav-links.active { transform: translateY(0); }

            .nav-links a {
                font-size: 0.875rem;
                padding: 0.4rem 0;
            }
        }

        /* ── Hero ───────────────────────────────────────────── */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(ellipse 80% 60% at 50% 55%,
                rgba(30, 60, 110, 0.35) 0%,
                rgba(9, 10, 15, 0) 70%),
                var(--hero-bg);
        }

        #particle-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .hero-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            width: 100%;
            padding: 0 1rem;
        }

        /* ── AI Status Label ────────────────────────────────── */
        .ai-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            animation: fadeSlideDown 0.8s ease both;
        }

        .waveform {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .waveform span {
            display: block;
            width: 3px;
            border-radius: 2px;
            background: var(--text-dim);
            animation: waveBar 1.2s ease-in-out infinite;
        }

        .waveform span:nth-child(1) { animation-delay: 0.00s; height: 6px; }
        .waveform span:nth-child(2) { animation-delay: 0.15s; height: 10px; }
        .waveform span:nth-child(3) { animation-delay: 0.30s; height: 16px; }
        .waveform span:nth-child(4) { animation-delay: 0.45s; height: 10px; }
        .waveform span:nth-child(5) { animation-delay: 0.60s; height: 6px; }

        @keyframes waveBar {
            0%, 100% { transform: scaleY(0.35); opacity: 0.5; }
            50%       { transform: scaleY(1);    opacity: 1; }
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--status-green);
            flex-shrink: 0;
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 0   rgba(72, 199, 116, 0.55); }
            50%       { box-shadow: 0 0 0 7px rgba(72, 199, 116, 0); }
        }

        .ai-name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.04em;
        }

        /* ── Visual Wrap ────────────────────────────────────── */
        .visual-wrap {
            position: relative;
            width: 280px;
            height: 280px;
            animation: fadeSlideUp 1s ease 0.2s both;
        }

        @media (max-width: 480px) {
            .visual-wrap { width: 220px; height: 220px; }
        }

        /* Glow ring behind image */
        .visual-wrap::before {
            content: '';
            position: absolute;
            inset: -30%;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(60, 120, 200, 0.4)  0%,
                rgba(30, 60, 120, 0.15) 50%,
                transparent 70%);
            animation: glowPulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.08); }
        }

        .center-image {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            animation: breathe 6s ease-in-out infinite;
        }

        /* If user swaps to <img>, give it same sizing */
        .center-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1)     translateY(0px); }
            50%       { transform: scale(1.025) translateY(-8px); }
        }

        /* Placeholder — pure CSS, no image file needed */
        .placeholder-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background:
                radial-gradient(circle at 38% 32%,
                    #d0e8f8 0%,
                    #8ab8d8 18%,
                    #4a88b8 38%,
                    #235080 60%,
                    #0e2035 80%,
                    #060d18 100%);
            box-shadow:
                0 0 50px 15px rgba(60, 120, 200, 0.30),
                inset 0 0 50px rgba(0, 0, 0, 0.55);
        }

        /* ── Bottom Area ────────────────────────────────────── */
        .bottom-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.9rem;
            width: 100%;
            max-width: 420px;
            animation: fadeSlideUp 1s ease 0.45s both;
        }

        .hero-caption {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            text-align: center;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 0.6rem;
            padding: 0.55rem 0.55rem 0.55rem 1rem;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: rgba(100, 160, 220, 0.45);
        }

        .hero-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: inherit;
        }

        .hero-input::placeholder { color: var(--text-dim); }

        .mic-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 0.45rem;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            background: rgba(100, 160, 220, 0.2);
            color: var(--text-primary);
        }

        .save-memory-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .save-memory-bar .timer {
            font-variant-numeric: tabular-nums;
            color: rgba(255, 255, 255, 0.6);
        }

        .save-memory-link {
            color: rgba(160, 200, 240, 0.8);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.75rem;
            font-family: inherit;
            transition: color 0.2s;
            padding: 0;
        }

        .save-memory-link:hover { color: #fff; }

        .dismiss-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0 0.1rem;
            transition: color 0.2s;
        }

        .dismiss-btn:hover { color: var(--text-primary); }

        /* ── Entrance animations ────────────────────────────── */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ─────────────────────────────────────────── */
        footer {
            background-color: rgba(9, 10, 15, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            padding: 2.5rem 0;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .footer-content {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .footer-logo {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .footer-tagline {
            margin-top: 0.35rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer-links {
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--text-primary); }

        .copyright {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.25);
        }

        /* ── Greeting ───────────────────────────────────────── */
        .greeting {
            position: absolute;
            top: 4.5rem;
            right: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-dim);
            z-index: 5;
            pointer-events: none;
        }

        @media (max-width: 768px) { .greeting { display: none; } }
    </style>
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────── -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Yan Linyi</a>
                <button class="menu-toggle" aria-label="Toggle menu">☰</button>
                <div class="nav-links">
                    <a href="index.html" class="active">首页</a>
                    <a href="playbook.html">方法论</a>

    <!-- ── Hero ────────────────────────────────────────────── -->
    <main>

                <!-- AI Status Label -->
                <div class="ai-label">

                <!-- Caption + Input -->

                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8"  y1="23" x2="16" y2="23"/>

                    <div class="save-memory-bar" id="save-memory-bar">
                        <span class="timer" id="memory-timer">00:03</span>
                        <button class="save-memory-link">Save Memory ›</button>
                        <button class="dismiss-btn" id="dismiss-memory" aria-label="Dismiss">✕</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- ── Footer ──────────────────────────────────────────── -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div>
                    <div class="footer-logo">Yan Linyi的个人主页</div>
                    <p class="footer-tagline">No Game, No Life</p>
                </div>
                <div class="footer-links">
                    <a href="mailto:contact@example.com">Email</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">知乎</a>
                    <a href="#">微信</a>
                </div>
            </div>
            <p class="copyright">&copy; 2025 Linyi Yan. All rights reserved.</p>
        </div>
    </footer>

    <!-- ── Scripts ─────────────────────────────────────────── -->
    <script src="js/time-utility.js"></script>
    <script src="js/theme-switcher.js"></script>

    <script>
    /* ════════════════════════════════════════════════════
       Canvas Particle System
       Particles drift in an elliptical cloud around the
       center image, producing the nebula/dust halo effect.
    ════════════════════════════════════════════════════ */
    (function () {
        var canvas = document.getElementById('particle-canvas');
        var ctx    = canvas.getContext('2d');
        var W, H, cx, cy, rx, ry;
        var PARTICLE_COUNT = 180;
        var particles = [];

        function resize() {
            W  = canvas.width  = window.innerWidth;
            H  = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2 - 20;
            rx = Math.min(W * 0.26, 200);
            ry = rx * 0.62;
        }

        function rand(min, max) { return min + Math.random() * (max - min); }

        function initParticles() {
            particles = [];
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    angle:       rand(0, Math.PI * 2),
                    spread:      rand(0.55, 1.45),
                    driftX:      rand(-18, 18),
                    driftY:      rand(-12, 12),
                    speed:       rand(0.0003, 0.0012),
                    size:        rand(0.8, 2.6),
                    baseOpacity: rand(0.18, 0.85),
                    opacity:     0,
                    phase:       rand(0, Math.PI * 2),
                    wobbleAmp:   rand(4, 20),
                    wobbleSpeed: rand(0.4, 1.2),
                    r: Math.floor(rand(140, 210)),
                    g: Math.floor(rand(180, 230)),
                    b: 255
                });
            }
        }

        var lastT = 0;
        function draw(t) {
            var dt = Math.min(t - lastT, 40);
            lastT  = t;
            ctx.clearRect(0, 0, W, H);

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.angle += p.speed * dt;

                var wobble = p.wobbleAmp * Math.sin(p.wobbleSpeed * t * 0.001 + p.phase);
                var ex = cx + (rx * p.spread + wobble)       * Math.cos(p.angle) + p.driftX;
                var ey = cy + (ry * p.spread + wobble * 0.5) * Math.sin(p.angle) + p.driftY;

                p.opacity = p.baseOpacity * (0.6 + 0.4 * Math.sin(t * 0.0008 + p.phase));

                ctx.beginPath();
                ctx.arc(ex, ey, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',' + p.opacity.toFixed(3) + ')';
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        requestAnimationFrame(draw);
    })();


    /* ════════════════════════════════════════════════════
       Save Memory Timer
    ════════════════════════════════════════════════════ */
    (function () {
        var bar     = document.getElementById('save-memory-bar');
        var timerEl = document.getElementById('memory-timer');
        var dismiss = document.getElementById('dismiss-memory');
        var seconds = 3;

        var interval = setInterval(function () {
            seconds++;
            var m = String(Math.floor(seconds / 60)).padStart(2, '0');
            var s = String(seconds % 60).padStart(2, '0');
            timerEl.textContent = m + ':' + s;
        }, 1000);

        dismiss.addEventListener('click', function () {
            bar.style.display = 'none';
            clearInterval(interval);
        });
    })();


    /* ════════════════════════════════════════════════════
       Mobile Nav + Greeting
    ════════════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', function () {
        var toggle   = document.querySelector('.menu-toggle');
        var navLinks = document.querySelector('.nav-links');

        if (toggle) {
            toggle.addEventListener('click', function () {
                navLinks.classList.toggle('active');
            });
        }

        document.querySelectorAll('.nav-links a').forEach(function (a) {
            a.addEventListener('click', function () {
                if (window.innerWidth <= 768) navLinks.classList.remove('active');
            });
        });

        document.addEventListener('click', function (e) {
            if (window.innerWidth <= 768
                && !e.target.closest('.nav-links')
                && !e.target.closest('.menu-toggle')
                && navLinks.classList.contains('active')) {
                navLinks.classList.remove('active');
            }
        });

        if (typeof TimeUtility !== 'undefined') {
            var el = document.getElementById('time-greeting');
            if (el) {
                el.textContent = TimeUtility.getGreeting();
                setInterval(function () { el.textContent = TimeUtility.getGreeting(); }, 60000);
            }
        }
    });
    </script>
</body>
